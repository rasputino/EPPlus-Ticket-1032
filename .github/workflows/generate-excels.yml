name: Generate Excel Files

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-excels:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1
      with:
        msbuild-version: latest

    - name: Restore NuGet packages
      run: nuget restore EPPlus-Ticket-1032/EPPlus-Ticket-1032.sln

    - name: Build V5
      run: msbuild "EPPlus-Ticket-1032/EPPlus-Ticket-1032-V5/EPPlus-Ticket-1032-V5.vbproj" /p:Configuration=Release

    - name: Build V8
      run: msbuild "EPPlus-Ticket-1032/EPPlus-Ticket-1032-V8/EPPlus-Ticket-1032-V8.vbproj" /p:Configuration=Release

    - name: Build V8 with fix
      run: msbuild "EPPlus-Ticket-1032/EPPlus-Ticket-1032-V8-Fix/EPPlus-Ticket-1032-V8-Fix.vbproj" /p:Configuration=Release

    - name: Create output directory
      run: mkdir output -Force
      shell: pwsh

    - name: Run V5 Generation
      run: .\EPPlus-Ticket-1032\EPPlus-Ticket-1032-V5\bin\Release\EPPlus-Ticket-1032-V5.exe
      continue-on-error: true

    - name: Run V8 Generation
      run: .\EPPlus-Ticket-1032\EPPlus-Ticket-1032-V8\bin\Release\EPPlus-Ticket-1032-V8.exe
      continue-on-error: true

    - name: Run V8 with fix Generation
      run: .\EPPlus-Ticket-1032\EPPlus-Ticket-1032-V8-Fix\bin\Release\EPPlus-Ticket-1032-V8-Fix.exe
      continue-on-error: true

    - name: Move Excel Files
      run: |
        $desktopPath = [Environment]::GetFolderPath([Environment+SpecialFolder]::Desktop)
        Get-ChildItem "$desktopPath\Test V5*.xlsx" -ErrorAction SilentlyContinue | Move-Item -Destination output\ -Force
        Get-ChildItem "$desktopPath\Test V7*.xlsx" -ErrorAction SilentlyContinue | Move-Item -Destination output\ -Force
        Write-Host "Files in output directory:"
        Get-ChildItem output\ -ErrorAction SilentlyContinue
      shell: pwsh
      continue-on-error: true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Excel Files
        path: output/
        if-no-files-found: warn
        retention-days: 30

    - name: Commit and Push (if files changed)
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/ -f
        if (git diff --quiet --cached) {
          Write-Host "No changes to commit"
        } else {
          git commit -m "📊 Auto-generated Excel files [skip ci]"
          git push origin main
        }
      shell: pwsh
      continue-on-error: true